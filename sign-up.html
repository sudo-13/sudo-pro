<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sign-up</title>
  <link rel="stylesheet" href="styles/sign-up.css">
  <link rel="shortcut icon" href="images/e614fa6c1b7bd4b69a82136791aeb88bf0f6a3f3.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="body">
    <div class="sign-up-page">
      <div class="left">
        <div class="left-text">
          <h1>
            Welcome Back!
          </h1>
          <p>
            To connect back with us please login with your <br> peosonal info
          </p>
          <button>
            <a href="sign-in.html">Sign In</a>
          </button>
        </div>
      </div>
      <div class="right">
        <div>
          <h1>Create Account</h1>
        </div>
        <div>
          <p>To connect back withh us please login with <br> your personal info</p>
        </div>
        <form>
          <input type="text" placeholder="User Name">
          <input type="email" placeholder="Email">
          <input type="tel" placeholder="Contact Number">
          <input type="password" placeholder="Password">
          <input type="password" placeholder="Confirm Password">
          <div class="location-field">
            <input type="text" placeholder="Location (optional)">
            <!-- <div> -->
              <img class="location-icon" src="images/location.png" alt="">
            <!-- </div> -->
          </div>
        </form>
        <button>
          Sign Up
        </button>
      </div>
    </div>
  </div>

</body>
</html>
